name: App CI

on:
    push:
        branches: [ main, develop ]
        paths:
            - 'app/**'
            - '.github/workflows/app-ci.yml'
    pull_request:
        branches: [ main, develop ]
        paths:
            - 'app/**'
            - '.github/workflows/app-ci.yml'
    workflow_call:

concurrency:
    group: app-ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-and-build:
        name: Lint & Build
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 20

            -   name: Setup pnpm
                uses: pnpm/action-setup@v4
                with:
                    version: 9.15.0

            -   name: Cache pnpm store
                uses: actions/cache@v4
                with:
                    path: ~/.local/share/pnpm/store
                    key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
                    restore-keys: pnpm-store-

            -   name: Cache Next.js build
                uses: actions/cache@v4
                with:
                    path: app/.next/cache
                    key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**/*.ts', 'app/**/*.tsx') }}
                    restore-keys: |
                        nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
                        nextjs-

            -   name: Install dependencies
                run: pnpm install --frozen-lockfile

            -   name: Lint
                run: pnpm --filter @kop/app run lint

            -   name: Build
                run: pnpm --filter @kop/app run build
                env:
                    NEXT_PUBLIC_API_URL: https://staging-api.king-of-paddock.fr
                    AUTH_SECRET: ci-build-secret-not-for-production
