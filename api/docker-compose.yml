version: '3'
services:
    mysql:
        image: mysql:$MYSQL_SERVER_VERSION
        profiles: [ "linux", "macos" ]
        environment:
            MYSQL_DATABASE: $MYSQL_DB
            MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PWD
        networks:
            default:
                aliases:
                    - $MYSQL_SERVICE
        volumes:
            - 'db:/var/lib/mysql:rw'
            - ./config/docker/mysql.cnf:/etc/mysql/conf.d/kop.cnf

    php:
        build:
            context: ./config/docker/images/php-fpm/
            dockerfile: Dockerfile
        profiles: [ "linux", "macos" ]
        volumes:
            - '.:/var/www/kop'
            - './config/docker/php.ini:/usr/local/etc/php/conf.d/kop.ini'
            - $HOME/.composer:/composer
            - $HOME/.ssh/config:/var/tmp/sshconf
            - $HOME/.ssh/known_hosts:/var/tmp/ssh_hosts
            - $HOME/.ssh/id_rsa:/var/tmp/id
        working_dir: /var/www/kop
        depends_on:
            - mysql
        expose:
            - 9000
        networks:
            - default
        environment:
            LOCAL_USER_ID: $USER_ID
            APP_ENVIRONNEMENT_DEV: 1
            APP_ENVIRONNEMENT_TEST: 1

    nginx:
        image: nginx:1.27-alpine
        profiles: [ "linux", "macos" ]
        networks:
            default:
                aliases:
                    - kop.local
        depends_on:
            - php
        volumes:
            - '.:/var/www/kop'
            - ./config/docker/nginx.conf:/etc/nginx/nginx.conf
            - ./config/docker/symfony.conf:/etc/nginx/sites-available/symfony.conf
            - ./config/docker/symfony.conf:/etc/nginx/sites-enabled/symfony.conf
            - ./config/docker/upstream.conf:/etc/nginx/conf.d/upstream.conf
            - ./config/docker/images/nginx/localhost.crt:/certs/localhost.crt
            - ./config/docker/images/nginx/localhost.key:/certs/localhost.key

    mailcatcher:
        image: schickling/mailcatcher
        profiles: [ "linux", "macos" ]
        networks:
            default:
                aliases:
                    - service.mailcatcher

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
        profiles: [ "linux", "macos" ]
        volumes:
            - esdata:/usr/share/elasticsearch/data
        environment:
            'discovery.type': single-node
        networks:
            default:
                aliases:
                    - service.elasticsearch

    nodejs:
        image: node:18-alpine
        profiles: [ "linux", "macos" ]
        environment:
            - LOCAL_USER_ID=$USER_ID
            - LOCAL_GROUP_ID=$GROUP_ID
        volumes:
            - '.:/var/www/kop'
            - $HOME/.ssh/config:/var/tmp/sshconf
            - $HOME/.ssh/known_hosts:/var/tmp/ssh_hosts
            - $HOME/.ssh/id_rsa:/var/tmp/id
        working_dir: /var/www/kop

    stripe-cli:
        image: stripe/stripe-cli
        command: "listen --api-key ${STRIPE_SECRET} --forward-to nginx:80/payment/confirm"
        networks:
            - default

volumes:
    db: {}
    esdata: {}

networks:
    default: {}
