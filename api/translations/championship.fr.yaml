            number_of_players:
                label: 'Nombre de joueurs'
            joker_enabled:
                label: 'Jouer avec les jokers'
            submit:
                label: 'Créer le championnat'
    info:
        message:
            success: 'Le championnat a bien été créé.'
invitation:
    page:
        title: 'En attente de joueurs'
    title: '%championship_name%</div> <span>en attente de joueurs</span>'
    section:
        share_code:
            title:
                label: 'Utiliser un code d''invitation'
            description:
                label: 'Inviter vos amis à rejoindre « %championship_name% » en leur transmettant le code ci-dessous. <b>Et gagnez 20 jetons KOP</b> %icon% si un joueur s''inscrit sur King of Paddock pour rejoindre votre championnat.'
            invitation_code:
                label: 'Code d''invitation'
            button:
                label: 'Partager le code'
                data_share:
                    title:
                        label: 'Rejoignez une fantasy league King of Paddock !'
                    description:
                        label: 'Vous êtes invité par %creator_pseudo% à rejoindre le championnat %championship_name% sur l''application King of Paddock. Connectez-vous et utilisez le code %invitation_code% pour jouer avec vos amis !'
                    url:
                        label: 'https://www.king-of-paddock.com'
        players:
            title:
                label: 'Joueurs inscrits <span class="text-primary">%count% sur %max%</span>'
        start:
            title:
                label: 'Lancer le championnat manuellement'
            description:
                label: 'Si le nombre de joueurs est pair, vous pouvez lancer manuellement le championnat. Sinon, attendez simplement que le nombre de joueurs souhaité soit atteint et le championnat débutera automatiquement.'
            button:
                label: 'Lancer le championnat'
        cancel:
            button:
                label: 'Annuler le championnat'
