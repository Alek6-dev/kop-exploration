repositoryUrl: "https://github.com/alexisKOP/kop-app"
tagFormat: ${version}
plugins: [
    ["@semantic-release/commit-analyzer", {
        "preset": "angular",
        "releaseRules": [
            { "type": "docs", "release": "patch" },
            { "type": "refactor", "release": "patch" },
            { "type": "style", "release": "patch" },
            { "type": "ci", "release": "patch" },
            { "type": "chore", "release": "patch" },
            { "type": "style", "release": "patch" },
            { "type": "perf", "release": "patch" },
            { "type": "test", "release": "patch" }
        ]
    } ],
    [ "@semantic-release/release-notes-generator", {
        "preset": "conventionalcommits",
        "presetConfig": {
            "types": [
                { "type": "feat", "section": "Features" },
                { "type": "fix", "section": "Bug Fixes" },
                { "type": "chore", "section": "Divers", "hidden": false},
                { "type": "docs", "section": "Docs", "hidden": false},
                { "type": "style", "section": "Styles", "hidden": false},
                { "type": "refactor", "section": "Optimisations", "hidden": false},
                { "type": "perf", "section": "Optimisations", "hidden": false},
                { "type": "ci", "section": "Optimisations", "hidden": false},
                { "type": "test", "section": "Tests", "hidden": false}
            ]
        }
    } ],
    "@semantic-release/github"
]
branches:
    - "develop"
    - "+([0-9])?(.{+([0-9]),x}).x"
    - name: "alpha"
      prerelease: "alpha"
    - name: 'next'
      channel: 'next'
